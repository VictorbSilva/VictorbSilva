name: Atualizar Github Readme Stats

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch: 

jobs:
  atualizar-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Gerar Card de Estatísticas
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&show_icons=true&theme=dracula' 
          path: profile/stats.svg
          token: ${{ secrets.PAT_TOKEN }}

      - name: Gerar Card de Linguagens
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: 'username=${{ github.repository_owner }}&layout=compact&theme=dracula'
          path: profile/top-langs.svg
          token: ${{ secrets.PAT_TOKEN }}

      - name: Commitar e Fazer Push das Imagens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Atualizando imagens do Github Readme Stats" || exit 0
          git push
